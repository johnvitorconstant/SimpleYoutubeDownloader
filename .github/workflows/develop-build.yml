# Build da branch develop e publica o pacote para download (Artifacts + Release pré-release).
name: Develop build

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: develop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish (win-x64, self-contained)
        run: >
          dotnet publish SimpleYoutubeDownloader.csproj
          -c Release
          -o "${{ github.workspace }}/publish"

      # FFmpeg não fica no Git; incluímos no zip via build oficial (BtbN, LGPL).
      - name: Add FFmpeg to publish folder
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ffUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl.zip"
          Invoke-WebRequest -Uri $ffUrl -OutFile "ffmpeg-win64.zip" -UseBasicParsing
          Expand-Archive "ffmpeg-win64.zip" -DestinationPath "ffmpeg_pkg" -Force
          $root = Get-ChildItem "ffmpeg_pkg" -Directory | Select-Object -First 1
          if (-not $root) { throw "FFmpeg zip: pasta raiz não encontrada" }
          $bin = Join-Path $root.FullName "bin"
          if (-not (Test-Path $bin)) { throw "FFmpeg zip: pasta bin não encontrada" }
          Copy-Item -Path (Join-Path $bin "*") -Destination "publish" -Force
          if (-not (Test-Path "publish/ffmpeg.exe")) { throw "ffmpeg.exe não foi copiado para publish/" }
          Remove-Item "ffmpeg-win64.zip", "ffmpeg_pkg" -Recurse -Force

      - name: Zip output
        shell: pwsh
        run: |
          $zip = "SimpleYoutubeDownloader-develop-win-x64.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "publish/*" -DestinationPath $zip -CompressionLevel Optimal
          Get-Item $zip | Format-List Name, Length

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleYoutubeDownloader-develop-win-x64
          path: SimpleYoutubeDownloader-develop-win-x64.zip

      - name: Create prerelease with zip (download no GitHub)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: develop-${{ github.run_id }}
          name: "Develop build ${{ github.run_id }}"
          body: |
            Build automático da branch **develop** (Windows x64, self-contained).

            - **Commit:** `${{ github.sha }}`
            - **Disparado por:** @${{ github.actor }}

            Inclui `SimpleYoutubeDownloader.exe`, dependências nativas (WebView2 loader, etc.) e **`ffmpeg.exe`** (e DLLs do mesmo `bin`, se existirem), obtidos no build a partir do [BtbN/FFmpeg-Builds](https://github.com/BtbN/FFmpeg-Builds) (pacote **win64-lgpl**). O FFmpeg **não** está versionado no Git — só entra neste zip na CI.

            Para builds feitos **na tua máquina**, continua a ser preciso copiar o `ffmpeg.exe` para a pasta de saída (ver README).

            Também é possível baixar o mesmo zip em **Actions → este workflow run → Artifacts**.
          files: SimpleYoutubeDownloader-develop-win-x64.zip
          prerelease: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
